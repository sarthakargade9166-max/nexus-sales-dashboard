<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — SalesIQ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">

<div class="auth-bg">
  <div class="auth-grid"></div>
  <div class="auth-glow"></div>
</div>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="bi bi-graph-up-arrow"></i></div>
      <div class="auth-logo-text">SalesIQ</div>
    </div>
    <p class="auth-subtitle">Create your free account</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="alert-custom alert-{{ cat }} mb-3">
          <i class="bi bi-exclamation-circle me-2"></i>{{ msg }}
        </div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="auth-field">
        <label class="auth-label">Username</label>
        <div class="input-wrap">
          <i class="bi bi-person input-icon"></i>
          <input type="text" name="username" class="auth-input" placeholder="Choose a username" required>
        </div>
      </div>
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <div class="input-wrap">
          <i class="bi bi-envelope input-icon"></i>
          <input type="email" name="email" class="auth-input" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" name="password" class="auth-input" placeholder="Min 6 characters" required id="pw">
        </div>
      </div>
      <div class="auth-field">
        <label class="auth-label">Confirm Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock-fill input-icon"></i>
          <input type="password" name="confirm_password" class="auth-input" placeholder="Repeat password" required id="pw2">
        </div>
      </div>

      <div id="pwMatch" class="pw-match-hint" style="display:none"></div>

      <button type="submit" class="btn-auth-submit mt-3">
        <i class="bi bi-person-plus-fill me-2"></i>Create Account
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</div>

<script>
const pw = document.getElementById('pw');
const pw2 = document.getElementById('pw2');
const hint = document.getElementById('pwMatch');
pw2.addEventListener('input', () => {
  if (!pw2.value) { hint.style.display = 'none'; return; }
  hint.style.display = 'block';
  if (pw.value === pw2.value) {
    hint.textContent = '✓ Passwords match';
    hint.className = 'pw-match-hint match';
  } else {
    hint.textContent = '✗ Passwords do not match';
    hint.className = 'pw-match-hint no-match';
  }
});
</script>
</body>
</html>
